<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Classifica — Art &amp; Science 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- URL non indicizzato: accesso solo a chi conosce il link -->
  <meta name="robots" content="noindex, nofollow">
</head>
<body>

  <div class="results-header">
    <h1>Art &amp; Science 2026 · Pisa</h1>
    <p>Classifica parziale — aggiornamento automatico ogni 60 s</p>
  </div>

  <div id="results-meta">
    <span id="n-voted">…</span>
    <span>Giurati: <strong id="n-giurati">7</strong></span>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center;
              padding:8px 16px; font-size:13px; color:#6b7280;
              max-width:900px; margin:0 auto;">
    <span id="last-update">—</span>
    <button id="btn-refresh"
      style="background:none;border:1px solid #e5e7eb;border-radius:6px;
             padding:4px 12px;font-size:13px;cursor:pointer;color:#374151;">
      ↻ Aggiorna ora
    </button>
  </div>

  <p id="results-status" style="text-align:center;color:#c0392b;padding:16px;"></p>

  <div class="view-toggle">
    <button id="btn-view-generale" class="view-btn view-btn-active" onclick="setView('generale')">Classifica generale</button>
    <button id="btn-view-liceo" class="view-btn" onclick="setView('liceo')">Per Liceo</button>
  </div>

  <div id="results-table-wrap"></div>

  <!-- Modal dettaglio opera -->
  <div id="opera-modal-overlay" onclick="closeOperaModal()"
       style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.65);
              z-index:1000; align-items:center; justify-content:center; padding:16px;">
    <div id="opera-modal" onclick="event.stopPropagation()"
         style="background:#fff; border-radius:12px; max-width:560px; width:100%;
                max-height:90vh; overflow-y:auto; padding:24px; position:relative;">
      <button onclick="closeOperaModal()"
              style="position:absolute; top:12px; right:14px; background:none; border:none;
                     font-size:22px; cursor:pointer; color:#6b7280; line-height:1;">×</button>
      <div id="opera-modal-n"
           style="font-size:12px; font-weight:600; color:#6366f1; text-transform:uppercase;
                  letter-spacing:.05em; margin-bottom:6px;"></div>
      <h2 id="opera-modal-title"
          style="margin:0 0 4px; font-size:1.15rem; color:#1a1a2e;"></h2>
      <p id="opera-modal-school"
         style="margin:0 0 16px; font-size:12px; color:#9ca3af;"></p>
      <img id="opera-modal-img" src="" alt=""
           style="width:100%; border-radius:8px; display:block; margin-bottom:16px;">
      <p id="opera-modal-desc"
         style="margin:0; font-size:14px; line-height:1.7; color:#374151;"></p>
    </div>
  </div>

  <footer style="text-align:center;padding:24px;font-size:12px;color:#9ca3af;">
    Art &amp; Science 2026 · Pisa · Votazione giuria
  </footer>

  <script src="js/results.js"></script>
</body>
</html>
